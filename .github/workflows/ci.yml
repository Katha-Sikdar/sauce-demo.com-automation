name: Sauce Demo UI Automation CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run UI Tests with Maven
        # Headless মোডে রান করার জন্য ডাইনামিক ব্রাউজার অপশন পাস করা হচ্ছে
        run: mvn clean test -Dbrowser=chrome -Dcucumber.options="--tags @Positive or @Negative"

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: target/cucumber-reports/